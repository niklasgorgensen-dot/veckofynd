const SUPA_URL = 'https://ihyolgjmppzgxhifhooh.supabase.co';

const SUPA_HEAD = { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}`, 'Content-Type': 'application/json' };

const supa = {
  async selectRaw(path) {
    const r = await fetch(`${SUPA_URL}/rest/v1/${path}`, { headers: SUPA_HEAD });
    return r.json();
  },
  async delete(table, id) {
    await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`, { method: 'DELETE', headers: SUPA_HEAD });
  },
  async deleteAll(table) {
    await fetch(`${SUPA_URL}/rest/v1/${table}?id=neq.0`, { method: 'DELETE', headers: SUPA_HEAD });
  },
  async update(table, id, data) {
    await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`, { method: 'PATCH', headers: { ...SUPA_HEAD, Prefer: 'return=minimal' }, body: JSON.stringify(data) });
  },
  async insert(table, row) {
    return fetch(`${SUPA_URL}/rest/v1/${table}`, { method: 'POST', headers: { ...SUPA_HEAD, Prefer: 'resolution=merge-duplicates' }, body: JSON.stringify(row) });
  }
};

let lastLocalWrite = 0;
let lastDataHash = '';

function markWrite() { lastLocalWrite = Date.now(); }

async function loadShoppingList() {
  // Don't overwrite local optimistic changes right after a write
  if (Date.now() - lastLocalWrite < 3500) return;
  try {
    const data = await supa.selectRaw('shopping_list?select=*');
    if (!Array.isArray(data)) return;
    const hash = JSON.stringify(data.map(r => [r.id, r.checked, r.qty]).sort());
    if (hash === lastDataHash) return; // nothing changed, skip re-render
    lastDataHash = hash;
    shoppingList = data.map(r => ({
      id: r.id, store: r.store, product: r.product, detail: r.detail,
      price: r.price, origPrice: r.orig_price, unit: r.unit,
      category: r.category, emoji: r.emoji, checked: r.checked,
      qty: r.qty || 1, isCustom: r.is_custom || false,
    }));
    render();
  } catch(e) { console.log('Load error', e); }
}

async function saveToSupabase(item) {
  const full = {
    id: item.id, store: item.store, product: item.product, detail: item.detail,
    price: item.price, orig_price: item.origPrice, unit: item.unit,
    category: item.category, emoji: item.emoji, checked: item.checked || false,
    qty: item.qty || 1, is_custom: item.isCustom || false,
  };
  let r = await supa.insert('shopping_list', full);
  if (!r.ok) {
    // Fallback if qty/is_custom columns don't exist yet (migration not run)
    const { qty, is_custom, ...basic } = full;
    r = await supa.insert('shopping_list', basic);
    if (!r.ok) { const t = await r.text(); console.error('Save error', r.status, t); }
  }
}

// ── Week info (auto) ──────────────────────────────────
function getWeekInfo() {
  const now = new Date();
  const d = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
  const dayNum = (d.getUTCDay() + 6) % 7;
  d.setUTCDate(d.getUTCDate() - dayNum + 3);
  const firstThursday = new Date(Date.UTC(d.getUTCFullYear(), 0, 4));
  const ftDay = (firstThursday.getUTCDay() + 6) % 7;
  firstThursday.setUTCDate(firstThursday.getUTCDate() - ftDay + 3);
  const week = 1 + Math.round((d - firstThursday) / (7 * 24 * 3600 * 1000));
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((now.getDay() + 6) % 7));
  const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
  const fmt = dt => dt.toLocaleDateString('sv-SE', { day: 'numeric', month: 'short' });
  return { week, range: `${fmt(monday)}–${fmt(sunday)}` };
}

// ── Price comparison (only exact product+unit matches with a real price gap) ──
function buildPriceCompare() {
  const groups = {};
  deals.forEach(d => {
    const key = d.product.toLowerCase().trim() + '|' + d.unit;
    (groups[key] = groups[key] || []).push(d);
  });
  const map = {};
  Object.values(groups).forEach(g => {
    if (g.length < 2) return;
    const min = Math.min(...g.map(x => x.price));
    const max = Math.max(...g.map(x => x.price));
    if (min === max) return; // identical price across stores → nothing useful to say
    const cheapest = g.find(x => x.price === min);
    g.forEach(d => {
      if (d.price === min) map[d.id] = { cheapest: true };
      else map[d.id] = { cheapest: false, store: getStore(cheapest.store).name.split(' ')[0], price: min };
    });
  });
  return map;
}

}

// ── List actions ──────────────────────────────────────
async function toggleInList(id) {
  const deal = deals.find(d => d.id === id);
  if (!deal) return;
  markWrite();
  if (shoppingList.find(i => i.id === id)) {
    shoppingList = shoppingList.filter(i => i.id !== id);
    render();
    await supa.delete('shopping_list', id);
  } else {
    shoppingList.push({ ...deal, qty: 1, checked: false, isCustom: false });
    render();
    await saveToSupabase({ ...deal, qty: 1, checked: false, isCustom: false });
  }
}

async function removeFromList(id) {
  markWrite();
  shoppingList = shoppingList.filter(i => i.id !== id);
  renderList();
  await supa.delete('shopping_list', id);
}

async function clearList() {
  if (!confirm('Rensa hela inköpslistan?')) return;
  markWrite();
  shoppingList = [];
  renderList();
  await supa.deleteAll('shopping_list');
}

async function toggleChecked(id) {
  const item = shoppingList.find(i => i.id === id);
  if (!item) return;
  const newChecked = !item.checked;
  markWrite();
  shoppingList = shoppingList.map(i => i.id === id ? { ...i, checked: newChecked } : i);
  renderList();
  await supa.update('shopping_list', id, { checked: newChecked });
}

async function changeQty(id, delta) {
  const item = shoppingList.find(i => i.id === id);
  if (!item) return;
  const newQty = Math.max(1, (item.qty || 1) + delta);
  markWrite();
  shoppingList = shoppingList.map(i => i.id === id ? { ...i, qty: newQty } : i);
  renderList();
  await supa.update('shopping_list', id, { qty: newQty });
}

function openCustomModal() { document.getElementById('custom-overlay').classList.add('open'); }
function closeCustomModal() { document.getElementById('custom-overlay').classList.remove('open'); }

async function addCustomItem() {
  const product = document.getElementById('c-product').value.trim();
  if (!product) return;
  const cat = document.getElementById('c-cat').value;
  const item = {
    id: Date.now(),
    store: document.getElementById('c-store').value,
    product,
    detail: 'Egen vara',
    price: 0, origPrice: 0, unit: 'st',
    category: cat,
    emoji: CAT_EMOJI[cat] || '🛒',
    qty: Math.max(1, parseInt(document.getElementById('c-qty').value) || 1),
    checked: false, isCustom: true,
  };
  markWrite();
  shoppingList.push(item);
  document.getElementById('c-product').value = '';
  document.getElementById('c-qty').value = '1';
  closeCustomModal();
  renderList();
  await saveToSupabase(item);
}

// ── History ───────────────────────────────────────────
async function archiveList() {
  if (!shoppingList.length) return;
  if (!confirm('Arkivera den här handlingen och rensa listan?')) return;
  const wi = getWeekInfo();
  const entry = { id: Date.now(), week: 'Vecka ' + wi.week + ' (' + wi.range + ')', items: shoppingList };
  markWrite();
  const r = await supa.insert('purchase_history', entry);
  if (!r.ok) { alert('Kunde inte spara historik – kör databasuppdateringen för historik.'); return; }
  shoppingList = [];
  await supa.deleteAll('shopping_list');
  await loadHistory();
  renderList();
}

async function loadHistory() {
  try {
    const d = await supa.selectRaw('purchase_history?select=*&order=archived_at.desc&limit=10');
    if (Array.isArray(d)) historyData = d;
  } catch(e) { console.log('History load error', e); }
}

function setListMode(m) { listMode = m; if (m === 'history') loadHistory().then(renderList); else renderList(); }

  const wi = getWeekInfo();
  const today = new Date().toLocaleDateString('sv-SE');

  STORES.filter(s => shoppingList.some(i => i.store === s.id)).forEach(store => {
    const items = shoppingList.filter(i => i.store === store.id);
    const total = items.reduce((s,i) => s + i.price * (i.qty||1), 0);
    lines.push(`📍 ${store.name}`);
    CATEGORIES.filter(c => c!=='Allt' && items.some(i => i.category===c)).forEach(cat => {
      lines.push(`  ${CAT_EMOJI[cat]} ${cat}`);
      items.filter(i => i.category===cat).forEach(item => {
        const q = (item.qty||1) > 1 ? ` ×${item.qty}` : '';
        const price = item.isCustom ? '' : ` – ${fmtKr(item.price)}`;
        lines.push(`    • ${item.product}${q}${price}`);
      });
    });
    if (total > 0) lines.push(`  💰 Ca ${Math.round(total)} kr`);
    lines.push('');
  });
  const totalCost = shoppingList.reduce((s,i) => s + i.price * (i.qty||1), 0);
  lines.push(`✅ Att betala ca: ${Math.round(totalCost)} kr`);
  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    ['copy-btn','copy-btn2'].forEach(id => {
      const b = document.getElementById(id);
      if (b) { b.dataset.orig = b.textContent; b.textContent = '✅ Kopierat!'; }
    });
    setTimeout(() => ['copy-btn','copy-btn2'].forEach(id => {
      const b = document.getElementById(id);
      if (b && b.dataset.orig) b.textContent = b.dataset.orig;
    }), 2200);
  });
}

// ── Add deal (existing offers) ────────────────────────
function openModal() { document.getElementById('modal-overlay').classList.add('open'); }
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

function addDeal() {
  const product = document.getElementById('f-product').value.trim();
  const price = parseFloat(document.getElementById('f-price').value);
  const origPrice = parseFloat(document.getElementById('f-orig').value);
  if (!product || !price || !origPrice) return;
  const cat = document.getElementById('f-cat').value;
  deals.unshift({
    id: Date.now(), store: document.getElementById('f-store').value, product,
    detail: document.getElementById('f-detail').value, price, origPrice, unit: 'förp',
    category: cat, emoji: CAT_EMOJI[cat] || '🛒', hot: false
  });
  ['f-product','f-detail','f-price','f-orig'].forEach(id => document.getElementById(id).value = '');
  closeModal();
  render();
}

// ── Render ────────────────────────────────────────────
function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const listCount = shoppingList.length;
  const lb = document.getElementById('list-btn');
  lb.textContent = listCount > 0 ? `🧾 ${listCount}` : '🧾';
  lb.className = listCount > 0 ? 'has-items' : '';
  if (currentView === 'deals') renderDeals(q);
  if (currentView === 'stores') renderStores();
  if (currentView === 'list') renderList();
}

function renderDeals(q) {
  const el = document.getElementById('view-deals');
  const cmp = buildPriceCompare();

  let filtered = deals
    .filter(d => activeStores.includes(d.store))
    .filter(d => activeCategory === 'Allt' || d.category === activeCategory)
    .filter(d => !q || d.product.toLowerCase().includes(q) || d.detail.toLowerCase().includes(q))
    .sort((a,b) => {
      if (sortBy === 'discount') return pct(b.price,b.origPrice) - pct(a.price,a.origPrice);
      if (sortBy === 'price') return a.price - b.price;
      return a.store.localeCompare(b.store);
    });

  const top3 = [...deals].filter(d=>activeStores.includes(d.store))
    .sort((a,b)=>pct(b.price,b.origPrice)-pct(a.price,a.origPrice)).slice(0,3);

  let html = `<div style="margin-bottom:16px"><div class="section-title">🔥 Veckans toppfynd</div><div class="scroll-row">`;
  top3.forEach(d => {
    const s = getStore(d.store);
    html += `<div class="top-card" style="border:2px solid ${s.color}25">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
        <span style="font-size:28px">${d.emoji}</span>
        <span class="discount-badge">-${pct(d.price,d.origPrice)}%</span>
      </div>
      <div class="product-name">${d.product}</div>
      <div class="product-detail">${d.detail}</div>
      ${d.limitedDays ? `<div style="font-size:10px;font-weight:800;color:#ff6b00;margin-bottom:4px">⏰ ${d.limitedDays}</div>` : ''}
      <div class="sale-price" style="color:${s.color}">${fmtKr(d.price)}</div>
      ${d.origPrice > d.price ? `<div class="orig-price">${fmtKr(d.origPrice)}/${d.unit}</div>` : `<div class="orig-price" style="text-decoration:none;color:#888">/${d.unit}</div>`}
      <div class="store-label" style="color:${s.color}">${s.name.split(' ')[0]}</div>
    </div>`;
  });
  html += `</div></div>`;

  html += `<div class="scroll-row" style="margin-bottom:8px">`;
  CATEGORIES.forEach(c => html += `<button class="pill${activeCategory===c?' active':''}" onclick="activeCategory='${c}';render()">${c}</button>`);
  html += `</div>`;

  html += `<div style="display:flex;gap:6px;align-items:center;margin-bottom:8px"><div style="font-size:12px;color:#888;font-weight:700">Sortera:</div>`;
  [['discount','Bäst rea'],['price','Lägst pris'],['store','Butik']].forEach(([v,l]) =>
    html += `<button class="sort-btn${sortBy===v?' active':''}" onclick="sortBy='${v}';render()">${l}</button>`);
  html += `</div>`;

  html += `<div class="scroll-row" style="margin-bottom:8px">`;
  STORES.forEach(s => {
    const on = activeStores.includes(s.id);
    html += `<button class="store-pill" style="border-color:${on?s.color:'#ddd'};background:${on?s.color+'18':'white'};color:${on?s.color:'#aaa'}" onclick="toggleStore('${s.id}')">${s.name.split(' ')[0]}</button>`;
  });
  html += `</div>`;

  if (!filtered.length) html += `<div style="text-align:center;padding:32px;color:#aaa;font-weight:700">Inga erbjudanden hittades</div>`;
  filtered.forEach(d => {
    const s = getStore(d.store);
    const inList = !!shoppingList.find(i => i.id === d.id);
    const c = cmp[d.id];
    let cmpHtml = '';
    if (c && c.cheapest) cmpHtml = `<div class="cheapest-badge">💚 Billigast just nu</div>`;
    else if (c) cmpHtml = `<div class="cheaper-elsewhere">↓ Billigare hos ${c.store}: ${c.price} kr</div>`;
    html += `<div class="deal-card" style="border:1.5px solid ${s.color}15">
      <span class="deal-emoji">${d.emoji}</span>
      <div class="deal-info">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span class="deal-name">${d.product}</span>
          ${d.hot ? '<span class="hot-badge">🔥 HET</span>' : ''}
        </div>
        <div class="deal-detail">${d.detail}</div>
        ${d.limitedDays ? `<div class="limited-badge">⏰ ${d.limitedDays}</div>` : ''}
        <div class="deal-prices">
          <span class="deal-sale" style="color:${s.color}">${fmtKr(d.price)}</span>
          ${d.origPrice > d.price
            ? `<span class="deal-orig">${fmtKr(d.origPrice)}/${d.unit}</span><span class="pct-badge">-${pct(d.price,d.origPrice)}%</span>`
            : `<span style="font-size:12px;color:#888">/${d.unit}</span>`}
        </div>
        <div class="deal-store" style="color:${s.color}">${s.name}</div>
        ${cmpHtml}
      </div>
      <button class="add-btn${inList?' in-list':''}" onclick="toggleInList(${d.id})">${inList?'✅':'➕'}</button>
    </div>`;
  });

  html += `<div style="text-align:center;margin-top:20px;padding-bottom:16px">
    <button onclick="openModal()" style="background:linear-gradient(135deg,#1a1a2e,#0f3460);color:white;border:none;border-radius:20px;padding:12px 28px;font-weight:800;font-size:14px;box-shadow:0 4px 16px rgba(15,52,96,0.3)">✏️ Lägg till eget erbjudande</button>
  </div>`;
  el.innerHTML = html;
}

function renderStores() {
  const el = document.getElementById('view-stores');
  let html = `<div style="font-weight:900;font-size:16px;color:#1a1a2e;margin-bottom:4px">🏪 Närmaste butiker från Farsta</div>
    <div style="font-size:12px;color:#888;margin-bottom:12px">Sorterade efter avstånd</div>`;
  STORES.forEach(s => {
    const count = deals.filter(d => d.store === s.id).length;
    html += `<div class="store-card" style="border-left:4px solid ${s.color}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-weight:800;font-size:15px;color:#1a1a2e">${s.name}</div>
          <div style="font-size:12px;color:#888;margin-top:2px">📍 ${s.address}</div>
          <div style="font-size:12px;color:#888">🕐 ${s.hours} varje dag</div>
          <div style="font-size:12px;color:${s.color};font-weight:800;margin-top:4px">📏 ${s.distance} från Farsta centrum</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:26px">${s.logo}</div>
          <div style="font-size:11px;color:#aaa;font-weight:700;margin-top:4px">${count} erbjudanden</div>
        </div>
      </div>
      <a href="${s.url}" target="_blank" class="store-link" style="background:${s.color}15;color:${s.color}">🌐 Se reklamblad på webben →</a>
    </div>`;
  });
  html += `<div class="tip-box">💡 <b>Tips:</b> Hemköp (0,4 km) och Coop (0,5 km) ligger närmast hemma. MatDax Hökarängen har ofta halvpris på kött och särskilda dagspriser (mån–tis / ons–tors). Willys har bland Sveriges lägsta matkassepriser.</div>`;
  el.innerHTML = html;
}

function renderList() {
  const el = document.getElementById('view-list');
  el.style.background = 'white';
  el.style.minHeight = '100vh';
  el.style.padding = '0';

  // segmented control (Aktuell / Historik)
  let html = `<div style="padding:14px 16px 8px"><div class="seg">
    <button class="${listMode==='current'?'active':''}" onclick="setListMode('current')">📋 Aktuell</button>
    <button class="${listMode==='history'?'active':''}" onclick="setListMode('history')">📜 Historik</button>
  </div></div>`;

  if (listMode === 'history') {
    if (!historyData.length) {
      html += `<div class="empty-state"><div style="font-size:48px;margin-bottom:12px">📜</div>
        <div style="font-weight:700;font-size:15px;color:#888">Ingen historik än</div>
        <div style="font-size:13px;margin-top:4px;color:#bbb">Arkivera en handling så sparas den här</div></div>`;
    } else {
      historyData.forEach(h => {
        const items = Array.isArray(h.items) ? h.items : [];
        const total = items.reduce((s,i) => s + (i.price||0) * (i.qty||1), 0);
        const date = h.archived_at ? new Date(h.archived_at).toLocaleDateString('sv-SE') : '';
        html += `<div style="padding:16px 20px 6px;border-top:8px solid #f7f7f7">
          <div style="font-size:17px;font-weight:900;color:#1a1a2e">${h.week || 'Handling'}</div>
          <div style="font-size:12px;color:#aaa">${date} · ${items.length} varor · ca ${Math.round(total)} kr</div></div>`;
        items.forEach(i => {
          const q = (i.qty||1) > 1 ? ` ×${i.qty}` : '';
          html += `<div style="padding:7px 20px;font-size:15px;color:#555">${i.product}${q} ${i.emoji||''}</div>`;
        });
      });
    }
    el.innerHTML = html;
    return;
  }

  // current list
  if (!shoppingList.length) {
    html += `<div class="empty-state"><div style="font-size:48px;margin-bottom:12px">🛒</div>
      <div style="font-weight:700;font-size:15px;color:#888">Listan är tom</div>
      <div style="font-size:13px;margin-top:4px;color:#bbb">Tryck ➕ på erbjudanden eller lägg till en egen vara</div>
      <button onclick="openCustomModal()" style="margin-top:16px;background:#1a1a2e;color:white;border:none;border-radius:14px;padding:10px 24px;font-weight:800;font-size:14px">➕ Lägg till egen vara</button>
    </div>`;
    el.innerHTML = html;
    return;
  }

  const doneCount = shoppingList.filter(i => i.checked).length;
  html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 20px 12px;border-bottom:1px solid #f0f0f0">
    <div style="font-size:13px;color:#aaa;font-weight:600">${doneCount} av ${shoppingList.length} klara</div>
    <div style="display:flex;gap:14px">
      <button id="copy-btn2" onclick="copyToNotes()" style="background:none;border:none;font-size:13px;color:#007aff;font-weight:700;padding:0">📋 Kopiera</button>
      <button onclick="clearList()" style="background:none;border:none;font-size:13px;color:#ff3b30;font-weight:700;padding:0">Rensa</button>
    </div>
  </div>`;

  STORES.filter(s => shoppingList.some(i => i.store === s.id)).forEach(store => {
    const items = shoppingList.filter(i => i.store === store.id);
    const total = items.reduce((s,i) => s + i.price * (i.qty||1), 0);
    const cats = CATEGORIES.filter(c => c !== 'Allt' && items.some(i => i.category === c));

    html += `<div style="padding:18px 20px 4px;display:flex;justify-content:space-between;align-items:baseline">
      <div style="font-size:22px;font-weight:900;color:${store.color};letter-spacing:-0.3px">${store.name}</div>
      ${total > 0 ? `<div style="font-size:14px;font-weight:800;color:${store.color}">ca ${Math.round(total)} kr</div>` : ''}
    </div>
    <div style="padding:0 20px 2px;font-size:12px;color:#aaa">${store.address} · ${store.hours}</div>`;

    cats.forEach(cat => {
      html += `<div style="padding:10px 20px 2px;font-size:12px;font-weight:800;color:#bbb;text-transform:uppercase;letter-spacing:1px">${CAT_EMOJI[cat]} ${cat}</div>`;
      items.filter(i => i.category === cat).forEach(item => {
        const checked = !!item.checked;
        const qty = item.qty || 1;
        const sub = item.isCustom ? 'Egen vara' : `${item.detail} · ${fmtKr(item.price)}`;
        html += `<div style="display:flex;align-items:center;padding:11px 20px;gap:12px;border-bottom:1px solid #f5f5f5;background:white">
          <div onclick="toggleChecked(${item.id})" style="width:26px;height:26px;border-radius:50%;border:2px solid ${checked ? store.color : '#d0d0d0'};background:${checked ? store.color : 'white'};flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer">
            ${checked ? '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><polyline points="2,7 6,11 12,3" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>' : ''}
          </div>
          <div onclick="toggleChecked(${item.id})" style="flex:1;min-width:0;cursor:pointer">
            <div style="font-size:17px;font-weight:500;color:${checked ? '#bbb' : '#1a1a1a'};text-decoration:${checked ? 'line-through' : 'none'};line-height:1.3">${item.product} ${item.emoji}</div>
            <div style="font-size:13px;color:${checked ? '#d0d0d0' : '#888'};margin-top:1px">${sub}</div>
          </div>
          <div class="qty-stepper">
            <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
            <span class="qty-num">${qty}</span>
            <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
            <button class="qty-btn" style="background:#ffe5e5;color:#cc0000" onclick="removeFromList(${item.id})">×</button>
          </div>
        </div>`;
      });
    });
    html += `<div style="height:8px;background:#f7f7f7;border-top:1px solid #eee;border-bottom:1px solid #eee"></div>`;
  });

  const totalCost = shoppingList.reduce((s,i) => s + i.price * (i.qty||1), 0);
  html += `<div style="padding:18px 20px 8px">
    <button onclick="openCustomModal()" style="width:100%;padding:12px;background:#eef1f7;border:none;border-radius:14px;font-size:14px;font-weight:800;color:#1a1a2e">➕ Lägg till egen vara</button>
  </div>`;
  html += `<div style="padding:0 20px 8px">
    <div style="background:linear-gradient(135deg,#1a1a2e,#0f3460);border-radius:16px;padding:16px;color:white;text-align:center">
      <div style="font-size:13px;font-weight:700;opacity:0.7">Att betala ca</div>
      <div style="font-size:30px;font-weight:900;color:#ffd700">${Math.round(totalCost)} kr</div>
      <button id="copy-btn" onclick="copyToNotes()" style="margin-top:12px;width:100%;padding:12px;background:#ffd700;color:#1a1a2e;border:none;border-radius:13px;font-size:14px;font-weight:800">📋 Kopiera till Apple Notes</button>
      <button onclick="archiveList()" style="margin-top:8px;width:100%;padding:11px;background:rgba(255,255,255,0.12);color:white;border:none;border-radius:13px;font-size:13px;font-weight:700">📦 Arkivera handling & rensa</button>
    </div>
  </div>`;
  el.innerHTML = html;
}

// ── Init ──────────────────────────────────────────────
const wi = getWeekInfo();
document.getElementById('app-subtitle').textContent = `Farsta-området · Vecka ${wi.week}, ${wi.range}`;

STORES.forEach(s => {
  document.getElementById('f-store').innerHTML += `<option value="${s.id}">${s.name}</option>`;
  document.getElementById('c-store').innerHTML += `<option value="${s.id}">${s.name}</option>`;
});
CATEGORIES.filter(c => c!=='Allt').forEach(c => {
  document.getElementById('f-cat').innerHTML += `<option value="${c}">${c}</option>`;
  document.getElementById('c-cat').innerHTML += `<option value="${c}">${c}</option>`;
});

render();
loadShoppingList();
loadHistory();
setInterval(loadShoppingList, 5000);
</script>
