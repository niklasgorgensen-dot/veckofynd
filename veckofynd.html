  .nav-btn.active { color: #ffd700; border-bottom: 3px solid #ffd700; }

  /* Scrollable rows */
  .scroll-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; }

  /* Top deal cards */

  .top-card .product-name { font-weight: 800; font-size: 13px; color: #1a1a2e; line-height: 1.2; margin-bottom: 2px; }
  .top-card .product-detail { font-size: 11px; color: #888; margin-bottom: 6px; }
  .top-card .sale-price { font-weight: 900; font-size: 17px; }
  .top-card .orig-price { font-size: 11px; color: #bbb; text-decoration: line-through; }
  .top-card .store-label { font-size: 10px; font-weight: 800; margin-top: 4px; }

  .pill { flex: 0 0 auto; padding: 6px 13px; border-radius: 20px; border: none; background: #e8ecf3; color: #555; font-weight: 700; font-size: 12px; }
  .pill.active { background: #1a1a2e; color: white; }
  .store-pill { flex: 0 0 auto; padding: 4px 10px; border-radius: 20px; font-weight: 700; font-size: 11px; border: 2px solid #ddd; background: white; color: #aaa; }

  .sort-btn.active { background: #0f3460; color: white; }

  .deal-info { flex: 1; min-width: 0; }
  .deal-name { font-weight: 800; font-size: 14px; color: #1a1a2e; }
  .hot-badge { background: #ff3b3b; color: white; font-size: 10px; font-weight: 800; border-radius: 6px; padding: 1px 5px; }

  .deal-orig { font-size: 12px; color: #bbb; text-decoration: line-through; }

    </div>
    <button id="list-btn" onclick="setView('list')">🧾 <span id="list-count"></span></button>
  </div>
  <input id="search" placeholder="🔍 Sök produkt..." oninput="render()">

<!-- Nav -->

  <button class="nav-btn" id="nav-list" onclick="setView('list')">📋 Inköpslista</button>

      <select id="f-store" class="form-input"></select></div>
    <div style="margin-bottom:12px"><label class="form-label">Produkt</label>
      <input id="f-product" class="form-input" placeholder="T.ex. Fläskfilé"></div>
    <div style="margin-bottom:12px"><label class="form-label">Detaljer</label>
      <input id="f-detail" class="form-input" placeholder="T.ex. Per kg, 800g förp"></div>
    <div style="margin-bottom:12px"><label class="form-label">Kategori</label>
      <select id="f-cat" class="form-input"></select></div>
    <div style="margin-bottom:12px"><label class="form-label">Rea-pris (kr)</label>
      <input id="f-price" class="form-input" type="number" placeholder="79"></div>
    <div style="margin-bottom:12px"><label class="form-label">Ordinarie pris (kr)</label>
      <input id="f-orig" class="form-input" type="number" placeholder="129"></div>
    <div style="display:flex;gap:8px;margin-top:16px">

  { id:50, store:"willyslanna", product:"Kycklingnuggets",         detail:"Eldorado, fryst",              price:39, origPrice:65, unit:"förp", category:"Kyckling",       emoji:"🍗",hot:false },
  { id:51, store:"willyslanna", product:"Kebab av karré",          detail:"Garant, fryst",                price:45, origPrice:75, unit:"förp", category:"Kött",           emoji:"🥙",hot:false },
  { id:52, store:"willyslanna", product:"Pasta korta former",      detail:"Monte Castello, 500g",         price:9,  origPrice:15, unit:"förp", category:"Pasta & Ris",    emoji:"🍝",hot:true  },
  { id:53, store:"willyslanna", product:"Pastasås",                detail:"Kelda, 400g",                  price:12, origPrice:22, unit:"förp", category:"Pasta & Ris",    emoji:"🍝",hot:false },
  { id:54, store:"willyslanna", product:"Prime Rökt skinka",       detail:"Charkskiva, 200g",             price:25, origPrice:45, unit:"förp", category:"Mejeri & Övrigt",emoji:"🥓",hot:false },
  { id:55, store:"willyslanna", product:"Hushållsost",             detail:"Garant, 700g",                 price:49, origPrice:89, unit:"förp", category:"Mejeri & Övrigt",emoji:"🧀",hot:true  },
];

let shoppingList = [];
let activeCategory = "Allt";
let activeStores = STORES.map(s => s.id);
let sortBy = "discount";
let currentView = "deals";

const pct = (p, o) => Math.round(((o-p)/o)*100);
const getStore = id => STORES.find(s => s.id === id);

function setView(v) {
  currentView = v;
  document.getElementById('view-deals').style.display = v==='deals' ? 'block' : 'none';
  document.getElementById('view-stores').style.display = v==='stores' ? 'block' : 'none';
  document.getElementById('view-list').style.display = v==='list' ? 'block' : 'none';
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-'+v).classList.add('active');
  render();
}

function toggleStore(id) {
  if (activeStores.includes(id)) activeStores = activeStores.filter(s => s !== id);
  else activeStores.push(id);
  render();
}

function toggleInList(id) {
  const deal = deals.find(d => d.id === id);
  if (!deal) return;
  if (shoppingList.find(i => i.id === id)) shoppingList = shoppingList.filter(i => i.id !== id);
  else shoppingList.push(deal);
  render();
}

function removeFromList(id) {
  shoppingList = shoppingList.filter(i => i.id !== id);
  render();
}

function clearList() {
  shoppingList = [];
  render();
}

function copyToNotes() {
  const today = new Date().toLocaleDateString('sv-SE');
  const lines = [`🛒 Inköpslista – ${today}`, `Vecka 22, 25 maj–1 juni 2026`, ''];
  STORES.filter(s => shoppingList.some(i => i.store === s.id)).forEach(store => {
    const items = shoppingList.filter(i => i.store === store.id);
    const total = items.reduce((s,i) => s+i.price, 0);
    const saved = items.reduce((s,i) => s+(i.origPrice-i.price), 0);
    lines.push(`📍 ${store.name} (${store.address})`);
    CATEGORIES.filter(c => c!=='Allt' && items.some(i => i.category===c)).forEach(cat => {
      lines.push(`  ${CAT_EMOJI[cat]} ${cat}`);
      items.filter(i => i.category===cat).forEach(item =>
        lines.push(`    • ${item.product} – ${item.price} kr (ord. ${item.origPrice} kr)`)
      );
    });
    lines.push(`  💰 Totalt: ${total} kr | Sparar: ${saved} kr`);
    lines.push('');
  });
  const totalSaved = shoppingList.reduce((s,i) => s+(i.origPrice-i.price), 0);
  const totalCost = shoppingList.reduce((s,i) => s+i.price, 0);
  lines.push(`✅ Totalt att betala: ${totalCost} kr`);
  lines.push(`🎉 Total besparing: ${totalSaved} kr`);
  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    const btn = document.getElementById('copy-btn');
    if (btn) { btn.textContent = '✅ Kopierat! Klistra in i Apple Notes'; btn.classList.add('copied'); }
    const btn2 = document.getElementById('copy-btn2');
    if (btn2) { btn2.textContent = '✅ Kopierat!'; btn2.classList.add('copied'); }
    setTimeout(() => {
      if (btn) { btn.textContent = '📋 Kopiera lista till Apple Notes'; btn.classList.remove('copied'); }
      if (btn2) { btn2.textContent = '📋 Kopiera till Notes'; btn2.classList.remove('copied'); }
    }, 2500);
  });
}

function openModal() { document.getElementById('modal-overlay').classList.add('open'); }
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

function addDeal() {
  const product = document.getElementById('f-product').value.trim();
  const price = parseFloat(document.getElementById('f-price').value);
  const origPrice = parseFloat(document.getElementById('f-orig').value);
  if (!product || !price || !origPrice) return;
  deals.unshift({
    id: Date.now(),
    store: document.getElementById('f-store').value,
    product,
    detail: document.getElementById('f-detail').value,
    price, origPrice,
    unit: 'förp',
    category: document.getElementById('f-cat').value,
    emoji: CAT_EMOJI[document.getElementById('f-cat').value] || '🛒',
    hot: false
  });
  document.getElementById('f-product').value = '';
  document.getElementById('f-detail').value = '';
  document.getElementById('f-price').value = '';
  document.getElementById('f-orig').value = '';
  closeModal();
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const listCount = shoppingList.length;

  // List button
  const lb = document.getElementById('list-btn');
  lb.textContent = listCount > 0 ? `🧾 ${listCount}` : '🧾';
  lb.className = listCount > 0 ? 'has-items' : '';

  if (currentView === 'deals') renderDeals(q);
  if (currentView === 'stores') renderStores();
  if (currentView === 'list') renderList();
}

function renderDeals(q) {
  const el = document.getElementById('view-deals');

  let filtered = deals
    .filter(d => activeStores.includes(d.store))
    .filter(d => activeCategory === 'Allt' || d.category === activeCategory)
    .filter(d => !q || d.product.toLowerCase().includes(q) || d.detail.toLowerCase().includes(q))
    .sort((a,b) => {
      if (sortBy === 'discount') return pct(b.price,b.origPrice) - pct(a.price,a.origPrice);
      if (sortBy === 'price') return a.price - b.price;
      return a.store.localeCompare(b.store);
    });

  const top3 = [...deals].filter(d=>activeStores.includes(d.store))
    .sort((a,b)=>pct(b.price,b.origPrice)-pct(a.price,a.origPrice)).slice(0,3);

  let html = `<div style="margin-bottom:16px">
    <div class="section-title">🔥 Veckans toppfynd</div>
    <div class="scroll-row">`;
  top3.forEach(d => {
    const s = getStore(d.store);
    html += `<div class="top-card" style="border:2px solid ${s.color}25">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
        <span style="font-size:28px">${d.emoji}</span>
        <span class="discount-badge">-${pct(d.price,d.origPrice)}%</span>
      </div>
      <div class="product-name">${d.product}</div>
      <div class="product-detail">${d.detail}</div>
      <div class="sale-price" style="color:${s.color}">${d.price} kr</div>
      <div class="orig-price">${d.origPrice} kr/${d.unit}</div>
      <div class="store-label" style="color:${s.color}">${s.name.split(' ')[0]}</div>
    </div>`;
  });
  html += `</div></div>`;

  // Category pills
  html += `<div class="scroll-row" style="margin-bottom:8px">`;
  CATEGORIES.forEach(c => {
    html += `<button class="pill${activeCategory===c?' active':''}" onclick="activeCategory='${c}';render()">${c}</button>`;
  });
  html += `</div>`;

  // Sort
  html += `<div style="display:flex;gap:6px;align-items:center;margin-bottom:8px">
    <div style="font-size:12px;color:#888;font-weight:700">Sortera:</div>`;
  [['discount','Bäst rea'],['price','Lägst pris'],['store','Butik']].forEach(([v,l]) => {
    html += `<button class="sort-btn${sortBy===v?' active':''}" onclick="sortBy='${v}';render()">${l}</button>`;
  });
  html += `</div>`;

  // Store pills
  html += `<div class="scroll-row" style="margin-bottom:8px">`;
  STORES.forEach(s => {
    const on = activeStores.includes(s.id);
    html += `<button class="store-pill" style="border-color:${on?s.color:'#ddd'};background:${on?s.color+'18':'white'};color:${on?s.color:'#aaa'}" onclick="toggleStore('${s.id}')">${s.name.split(' ')[0]}</button>`;
  });
  html += `</div>`;

  // Deal cards
  if (!filtered.length) {
    html += `<div style="text-align:center;padding:32px;color:#aaa;font-weight:700">Inga erbjudanden hittades</div>`;
  }
  filtered.forEach(d => {
    const s = getStore(d.store);
    const inList = !!shoppingList.find(i => i.id === d.id);
    html += `<div class="deal-card" style="border:1.5px solid ${s.color}15">
      <span class="deal-emoji">${d.emoji}</span>
      <div class="deal-info">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span class="deal-name">${d.product}</span>
          ${d.hot ? '<span class="hot-badge">🔥 HET</span>' : ''}
        </div>
        <div class="deal-detail">${d.detail}</div>
        <div class="deal-prices">
          <span class="deal-sale" style="color:${s.color}">${d.price} kr</span>
          <span class="deal-orig">${d.origPrice} kr/${d.unit}</span>
          <span class="pct-badge">-${pct(d.price,d.origPrice)}%</span>
        </div>
        <div class="deal-store" style="color:${s.color}">${s.name}</div>
      </div>
      <button class="add-btn${inList?' in-list':''}" onclick="toggleInList(${d.id})">${inList?'✅':'➕'}</button>
    </div>`;
  });

  html += `<div style="text-align:center;margin-top:20px;padding-bottom:16px">
    <button onclick="openModal()" style="background:linear-gradient(135deg,#1a1a2e,#0f3460);color:white;border:none;border-radius:20px;padding:12px 28px;font-weight:800;font-size:14px;box-shadow:0 4px 16px rgba(15,52,96,0.3)">✏️ Lägg till eget erbjudande</button>
  </div>`;

  el.innerHTML = html;
}

function renderStores() {
  const el = document.getElementById('view-stores');
  let html = `<div style="font-weight:900;font-size:16px;color:#1a1a2e;margin-bottom:4px">🏪 Närmaste butiker från Farsta</div>
    <div style="font-size:12px;color:#888;margin-bottom:12px">Sorterade efter avstånd</div>`;
  STORES.forEach(s => {
    const count = deals.filter(d => d.store === s.id).length;
    html += `<div class="store-card" style="border-left:4px solid ${s.color}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-weight:800;font-size:15px;color:#1a1a2e">${s.name}</div>
          <div style="font-size:12px;color:#888;margin-top:2px">📍 ${s.address}</div>
          <div style="font-size:12px;color:#888">🕐 ${s.hours} varje dag</div>
          <div style="font-size:12px;color:${s.color};font-weight:800;margin-top:4px">📏 ${s.distance} från Farsta centrum</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:26px">${s.logo}</div>
          <div style="font-size:11px;color:#aaa;font-weight:700;margin-top:4px">${count} erbjudanden</div>
        </div>
      </div>
      <a href="${s.url}" target="_blank" class="store-link" style="background:${s.color}15;color:${s.color}">🌐 Se reklamblad på webben →</a>
    </div>`;
  });
  html += `<div class="tip-box">💡 <b>Tips:</b> MatDax Hökarängen (1,8 km) är känt för halvpris på kött och storpack ris. Willys Skörndal (2,5 km) har Sveriges billigaste matkasse. Matvärlden Kungens Kurva är längre bort men har unikt sortiment och bra storpackpriser.</div>`;
  el.innerHTML = html;
}

function toggleChecked(id) {
  shoppingList = shoppingList.map(i => i.id === id ? Object.assign({}, i, { checked: !i.checked }) : i);
  renderList();
}

function renderList() {
  const el = document.getElementById('view-list');
  const hasItems = shoppingList.length > 0;

  // White Notes-style background
  el.style.background = 'white';
  el.style.minHeight = '100vh';
  el.style.padding = '0';

  let html = '';

  if (!hasItems) {
    el.style.background = '#f4f6fb';
    el.style.padding = '12px';
    html = `<div class="empty-state">
      <div style="font-size:48px;margin-bottom:12px">🛒</div>
      <div style="font-weight:700;font-size:15px;color:#888">Listan är tom</div>
      <div style="font-size:13px;margin-top:4px;color:#bbb">Tryck ➕ på erbjudanden för att lägga till</div>
      <button onclick="setView('deals')" style="margin-top:16px;background:#1a1a2e;color:white;border:none;border-radius:14px;padding:10px 24px;font-weight:800;font-size:14px">Se erbjudanden</button>
    </div>`;
    el.innerHTML = html;
    return;
  }

  // Toolbar
  html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:14px 20px 0;border-bottom:1px solid #f0f0f0;padding-bottom:12px">
    <div style="font-size:13px;color:#aaa;font-weight:600">${shoppingList.filter(i=>i.checked).length} av ${shoppingList.length} klara</div>
    <div style="display:flex;gap:8px">
      <button id="copy-btn2" onclick="copyToNotes()" style="background:none;border:none;font-size:13px;color:#007aff;font-weight:700;padding:0">📋 Kopiera</button>
      <button onclick="clearList()" style="background:none;border:none;font-size:13px;color:#ff3b30;font-weight:700;padding:0">Rensa</button>
    </div>
  </div>`;

  STORES.filter(s => shoppingList.some(i => i.store === s.id)).forEach(store => {
    const items = shoppingList.filter(i => i.store === store.id);
    const cats = CATEGORIES.filter(c => c !== 'Allt' && items.some(i => i.category === c));

    // Store heading — colored, bold, like a Notes section title
    html += `<div style="padding:20px 20px 4px">
      <div style="font-size:22px;font-weight:900;color:${store.color};letter-spacing:-0.3px">${store.name}</div>
      <div style="font-size:13px;color:#aaa;margin-top:1px">${store.address} · ${store.hours}</div>
    </div>`;

    cats.forEach(cat => {
      // Category label subtle, like a subheading
      html += `<div style="padding:10px 20px 2px;font-size:12px;font-weight:800;color:#bbb;text-transform:uppercase;letter-spacing:1px">${CAT_EMOJI[cat]} ${cat}</div>`;

      items.filter(i => i.category === cat).forEach(item => {
        const checked = !!item.checked;
        html += `<div onclick="toggleChecked(${item.id})" style="display:flex;align-items:center;padding:11px 20px;gap:14px;border-bottom:1px solid #f5f5f5;cursor:pointer;background:white">
          <!-- Circle checkbox -->
          <div style="width:26px;height:26px;border-radius:50%;border:2px solid ${checked ? store.color : '#d0d0d0'};background:${checked ? store.color : 'white'};flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s">
            ${checked ? '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><polyline points="2,7 6,11 12,3" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>' : ''}
          </div>
          <!-- Text -->
          <div style="flex:1;min-width:0">
            <div style="font-size:17px;font-weight:500;color:${checked ? '#bbb' : '#1a1a1a'};text-decoration:${checked ? 'line-through' : 'none'};transition:all 0.15s;line-height:1.3">
              ${item.product} ${item.emoji}
            </div>
            <div style="font-size:13px;color:${checked ? '#d0d0d0' : '#888'};margin-top:1px">${item.detail} · ${item.price} kr</div>
          </div>
        </div>`;
      });
    });

    // Thin divider between stores
    html += `<div style="height:8px;background:#f7f7f7;border-top:1px solid #eee;border-bottom:1px solid #eee;margin:8px 0"></div>`;
  });

  // Bottom copy button
  html += `<div style="padding:20px">
    <button id="copy-btn" onclick="copyToNotes()" style="width:100%;padding:14px;background:#f7f7f7;border:none;border-radius:14px;font-size:15px;font-weight:700;color:#007aff">📋 Kopiera lista till Apple Notes</button>
  </div>`;

  el.innerHTML = html;
}

// Init modal selects
STORES.forEach(s => {
  document.getElementById('f-store').innerHTML += `<option value="${s.id}">${s.name}</option>`;
});
CATEGORIES.filter(c => c!=='Allt').forEach(c => {
  document.getElementById('f-cat').innerHTML += `<option value="${c}">${c}</option>`;
});

render();
</script>
