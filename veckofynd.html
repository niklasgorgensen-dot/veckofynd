function getWeekInfo() {
  const now = new Date();
  const d = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
  const dayNum = (d.getUTCDay() + 6) % 7;
  d.setUTCDate(d.getUTCDate() - dayNum + 3);
  const firstThursday = new Date(Date.UTC(d.getUTCFullYear(), 0, 4));
  const ftDay = (firstThursday.getUTCDay() + 6) % 7;
  firstThursday.setUTCDate(firstThursday.getUTCDate() - ftDay + 3);
  const week = 1 + Math.round((d - firstThursday) / (7 * 24 * 3600 * 1000));
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((now.getDay() + 6) % 7));
  const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
  const fmt = dt => dt.toLocaleDateString('sv-SE', { day: 'numeric', month: 'short' });
  return { week, range: `${fmt(monday)}–${fmt(sunday)}` };
}

function storeById(id){ return STORES.find(s=>s.id===id) || FALLBACK_STORE; }
function storeLogo(st, size, radius){
  radius = radius || Math.round(size*0.3);
  const fallback = `<div style="width:${size}px;height:${size}px;border-radius:${radius}px;background:${st.color};color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:${Math.round(size*0.42)}px;flex:none;">${esc((st.name||'?')[0])}</div>`;
  if(!st.logoUrl) return fallback;
  const fbEsc = fallback.replace(/'/g,"\\'").replace(/"/g,'&quot;');
  return `<div style="width:${size}px;height:${size}px;border-radius:${radius}px;background:#fff;border:1px solid #EFE6D8;display:flex;align-items:center;justify-content:center;flex:none;overflow:hidden;padding:${Math.round(size*0.12)}px;box-sizing:border-box;"><img src="${st.logoUrl}" alt="${esc(st.name)}" style="width:100%;height:100%;object-fit:contain;" onerror="this.parentElement.outerHTML='${fbEsc}'"></div>`;
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function kr(n){ if(n==null||isNaN(n)) return '0 kr'; return (Number.isInteger(n)? String(n) : Number(n).toFixed(2).replace('.',',')) + ' kr'; }
function unitSuffix(u){ return u==='kg'?'/kg':u==='liter'?'/liter':u==='st'?'/st':u==='förp'?'/st':''; }
function isPerUnitDiscount(u){ return u==='st'||u==='förp'; }

async function loadShoppingList(){
  if (Date.now() - lastLocalWrite < 3500) return;
  try{
    const data = await supa.selectRaw('shopping_list?select=*');
    if(!Array.isArray(data)) return;
    const hash = JSON.stringify(data.map(r=>[r.id,r.checked,r.qty]).sort());
    if(hash===lastDataHash) return;
    lastDataHash = hash;
    shoppingList = data.map(r=>({ id:r.id, store:r.store, product:r.product, detail:r.detail, price:r.price, origPrice:r.orig_price, unit:r.unit, category:r.category, emoji:r.emoji, checked:r.checked, qty:r.qty||1, isCustom:r.is_custom||false }));
    render();
  }catch(e){ /* offline/förhandsvisning – synkar live */ }
}
function inList(id){ return shoppingList.some(i=>i.id===id); }
async function addOffer(id){
  const o = deals.find(d=>d.id===id); if(!o||inList(id)) return;
  const item = { id:o.id, store:o.store, product:o.product, detail:o.detail, price:o.price, origPrice:o.origPrice, unit:o.unit, category:o.category, emoji:o.emoji, checked:false, qty:1, isCustom:false };
  shoppingList.push(item); markWrite(); render();
  try{ await supa.insert('shopping_list', { id:item.id, store:item.store, product:item.product, detail:item.detail, price:item.price, orig_price:item.origPrice, unit:item.unit, category:item.category, emoji:item.emoji, checked:false, qty:1, is_custom:false }); }catch(e){ /* tyst */ }
}
async function toggleItem(id){
  const it = shoppingList.find(i=>i.id===id); if(!it) return;
  it.checked = !it.checked; markWrite(); render();
  try{ await supa.update('shopping_list', id, { checked: it.checked }); }catch(e){ /* tyst */ }
}
async function removeItem(id){
  shoppingList = shoppingList.filter(i=>i.id!==id); markWrite(); render();

  const chipDefs = ['Alla'].concat(present);
  const chips = chipDefs.map(c=>{ const a=cat===c;
    return `<button onclick="setCat('${c.replace(/'/g,"\\'")}')" style="padding:9px 15px;border-radius:12px;border:${a?'none':'1px solid #EFE6D8'};background:${a?'#E0552E':'#fff'};color:${a?'#fff':'#6A5E50'};font-weight:700;font-size:13px;white-space:nowrap;cursor:pointer;font-family:${FAM};flex:none;">${esc(c)}</button>`; }).join('');
  const visible = cat==='Alla'? deals : deals.filter(o=>o.category===cat);
  const grid = visible.map(offerCard).join('') || `<div style="color:#8A7E6E;font-size:14px;padding:20px;">Inga erbjudanden i denna kategori.</div>`;
  return `<div style="background:linear-gradient(135deg,#E0552E,#C2431F);border-radius:22px;padding:20px 22px;color:#fff;display:flex;align-items:center;gap:16px;box-shadow:0 12px 28px rgba(224,85,46,.26);margin-bottom:18px;">
      <div style="flex:1;">
        <div style="font-size:13px;opacity:.92;font-weight:600;">Veckans potential</div>
        <div style="font-family:${DISP};font-weight:800;font-size:clamp(30px,7.5vw,42px);line-height:1;margin-top:4px;">${kr(totalSave)}</div>
        <div style="font-size:13px;opacity:.92;margin-top:7px;">${deals.length} erbjudanden i Hägersten-området</div>
      </div>
      <div style="font-size:48px;line-height:1;">🥕</div>
    </div>
    <div class="vf-sc" style="display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:16px;">${chips}</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:14px;">${grid}</div>`;
}
function viewStores(){
  const cards = STORES.map(st=>{
    const items = deals.filter(o=>o.store===st.id);
    const save = items.reduce((a,o)=>a+(isPerUnitDiscount(o.unit)?Math.max(0,(o.origPrice||0)-o.price):0),0);
    const top = items.slice().sort((a,b)=>((b.origPrice||0)-b.price)-((a.origPrice||0)-a.price)).slice(0,3)
      .map(t=>`<div style="display:flex;justify-content:space-between;align-items:center;font-size:13.5px;gap:10px;"><span style="color:#5A4F43;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(t.product)}</span><span style="font-weight:800;color:#E0552E;flex:none;font-family:${DISP};">${kr(t.price)}${unitSuffix(t.unit)}</span></div>`).join('');
    return { st, count:items.length, save, html:(st0)=>'' , top };
  }).sort((a,b)=>b.count-a.count).map(({st,count,save,top})=>{
    return `<div style="background:#fff;border:1px solid #EFE6D8;border-radius:20px;padding:18px;box-shadow:0 2px 10px rgba(42,33,26,.04);">
      <div style="display:flex;align-items:center;gap:12px;">
        ${storeLogo(st,46,14)}
        <div style="flex:1;min-width:0;">
          <div style="font-family:${DISP};font-weight:700;font-size:16px;">${esc(st.name)}</div>
          <div style="font-size:12.5px;color:#8A7E6E;">📍 ${esc(st.distance)}</div>
        </div>
        <div style="text-align:right;flex:none;">
          <div style="font-family:${DISP};font-weight:800;font-size:20px;color:#4F7A3F;">${count}</div>
          <div style="font-size:10.5px;color:#8A7E6E;text-transform:uppercase;letter-spacing:.04em;">fynd</div>
        </div>
      </div>
      ${count?`<div style="margin-top:14px;padding-top:14px;border-top:1px dashed #E6DBC9;display:flex;flex-direction:column;gap:9px;">${top}</div>`:''}
      ${save>0?`<div style="margin-top:14px;background:#EAF1E3;color:#3E6632;font-weight:700;font-size:13px;border-radius:12px;padding:10px 12px;text-align:center;">Spara upp till ${kr(save)}</div>`:''}
    </div>`;
  }).join('');
  return `<div style="margin-bottom:16px;"><div style="font-family:${DISP};font-weight:800;font-size:23px;letter-spacing:-.01em;">Butiker i närheten</div><div style="font-size:13.5px;color:#8A7E6E;margin-top:2px;">Jämför veckans bästa fynd per butik</div></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;">${cards}</div>`;
}
function viewList(){
  if(!shoppingList.length){
    return `<div style="text-align:center;padding:60px 20px;">
      <div style="font-size:54px;">🧺</div>
      <div style="font-family:${DISP};font-weight:700;font-size:20px;margin-top:12px;">Listan är tom</div>
      <div style="font-size:14px;color:#8A7E6E;margin-top:6px;max-width:280px;margin-left:auto;margin-right:auto;">Lägg till veckans erbjudanden eller egna varor så samlas de här.</div>
      <button onclick="go('erbjudanden')" style="margin-top:18px;padding:11px 20px;border:none;border-radius:13px;background:#2A211A;color:#fff;font-weight:700;font-size:14px;font-family:${FAM};cursor:pointer;">Bläddra bland fynd</button>
    </div>`;
  }
  const totalPrice = shoppingList.reduce((a,i)=>a+(i.isCustom?0:i.price*i.qty),0);
  const totalSaved = shoppingList.reduce((a,i)=>a+(i.isCustom?0:Math.max(0,(i.origPrice||0)-i.price)*i.qty),0);
  const order=[], gmap={};
  shoppingList.forEach(i=>{ if(!gmap[i.store]){ const st=storeById(i.store); gmap[i.store]={name:st.name,color:st.color,logoUrl:st.logoUrl,items:[]}; order.push(i.store);} gmap[i.store].items.push(i); });
  const groups = order.map(k=>{ const g=gmap[k];
    const rows = g.items.map(i=>{
      const lineSave=Math.max(0,(i.origPrice||0)-i.price)*i.qty;
      const meta=(i.qty>1?i.qty+' st · ':'')+(i.isCustom?'egen vara':((i.origPrice>i.price)?('ord. '+kr(i.origPrice)+' · spar '+kr(lineSave)):(i.detail||i.unit||'')));
      const priceStr=i.isCustom?'—':kr(i.price*i.qty);
      const checkStyle=`width:25px;height:25px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none;font-size:13px;font-weight:800;color:#fff;background:${i.checked?'#4F7A3F':'#fff'};border:${i.checked?'1px solid #4F7A3F':'2px solid #E0D5C2'};`;
      const nameStyle=`font-weight:700;font-size:14.5px;color:${i.checked?'#B6A893':'#2A211A'};text-decoration:${i.checked?'line-through':'none'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;`;
      return `<div style="display:flex;align-items:center;gap:12px;padding:11px 12px;">
        <button onclick="toggleItem(${i.id})" style="${checkStyle}">${i.checked?'✓':''}</button>
        <div style="flex:1;min-width:0;"><div style="${nameStyle}">${esc(i.product)}</div><div style="font-size:12px;color:#8A7E6E;margin-top:1px;">${esc(meta)}</div></div>
        <span style="font-weight:800;font-size:14px;font-family:${DISP};color:#2A211A;">${priceStr}</span>
        <button onclick="removeItem(${i.id})" style="width:28px;height:28px;border-radius:9px;border:none;background:#F4EDE1;color:#A89A88;font-size:13px;cursor:pointer;flex:none;">✕</button>
      </div>`;
    }).join('');
    return `<div style="margin-bottom:16px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:9px;">${storeLogo(g,20,6)}<span style="font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:#8A7E6E;">${esc(g.name)}</span></div>
      <div style="background:#fff;border:1px solid #EFE6D8;border-radius:18px;padding:6px 4px;box-shadow:0 2px 10px rgba(42,33,26,.04);">${rows}</div>
    </div>`;
  }).join('');
  return `<div style="background:#2A211A;color:#fff;border-radius:20px;padding:18px 20px;display:flex;align-items:center;gap:16px;margin-bottom:18px;box-shadow:0 10px 24px rgba(42,33,26,.22);">
      <div style="flex:1;"><div style="font-size:12.5px;opacity:.65;">${shoppingList.length} varor att handla</div><div style="font-family:${DISP};font-weight:800;font-size:32px;line-height:1;margin-top:4px;">${kr(totalPrice)}</div></div>
      <div style="text-align:right;"><div style="font-size:11px;opacity:.65;text-transform:uppercase;letter-spacing:.04em;">Du sparar</div><div style="font-family:${DISP};font-weight:800;font-size:22px;color:#9FD27E;margin-top:3px;">-${kr(totalSaved)}</div></div>
    </div>${groups}`;
}
function recipeCard(r){
  const usedIds = new Set(r.dealIdsUsed||[]);
  const ingRows = (r.ingredients||[]).map(ing=>{
    const d = ing.fromDealId!=null ? deals.find(x=>x.id===ing.fromDealId) : null;
    const tag = d ? `<span style="margin-left:auto;flex:none;font-size:11px;font-weight:700;color:#3E6632;background:#EAF1E3;padding:3px 8px;border-radius:8px;">${esc(storeById(d.store).name)} · ${kr(d.price)}${unitSuffix(d.unit)}</span>` : '';
    return `<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #F3ECDF;font-size:13.5px;"><span>${esc(ing.amount||'')} ${esc(ing.name||'')}</span>${tag}</div>`;
  }).join('');
  const steps = (r.steps||[]).map((s,i)=>`<div style="display:flex;gap:10px;padding:6px 0;font-size:13.5px;line-height:1.5;"><span style="flex:none;width:22px;height:22px;border-radius:50%;background:#F0E8DA;color:#6A5E50;font-weight:800;font-size:11.5px;display:flex;align-items:center;justify-content:center;">${i+1}</span><span>${esc(s)}</span></div>`).join('');
  return `<div style="background:#fff;border:1px solid #EFE6D8;border-radius:20px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(42,33,26,.04);">
    <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:4px;">
      <div style="flex:1;font-family:${DISP};font-weight:800;font-size:18px;line-height:1.2;">${esc(r.title||'Recept')}</div>
      <div style="flex:none;font-size:11.5px;font-weight:700;color:#C2431F;background:#FBEAE2;padding:5px 9px;border-radius:9px;">${usedIds.size} fynd använda</div>
    </div>
    <div style="font-size:12.5px;color:#8A7E6E;margin-bottom:12px;">${r.servings?`${r.servings} port · `:''}${r.estimatedTotalCost!=null?`ca ${kr(r.estimatedTotalCost)} totalt`:''}</div>
    <div style="margin-bottom:10px;">${ingRows}</div>
    <div>${steps}</div>
  </div>`;
}
async function generateRecipes(){
  const val = document.getElementById('recipe_q');
  recipeQuery = val ? val.value : recipeQuery;
  recipeLoading = true; recipeError = null; recipeResult = null;
  render();
  try{
    const res = await fetch(`${SUPA_URL}/functions/v1/generate-recipe`, {
      method:'POST', headers: SUPA_HEAD,
      body: JSON.stringify({ deals: deals, request: recipeQuery })
    });
    const data = await res.json();
    if(!res.ok || data.error){ recipeError = data.error || 'Något gick fel, försök igen.'; }
    else { recipeResult = data; }
  }catch(e){ recipeError = 'Kunde inte nå AI-tjänsten. Kontrollera anslutningen.'; }
  recipeLoading = false;
  render();
}
function viewRecipes(){
  const intro = `<div style="background:linear-gradient(135deg,#4F7A3F,#3E6632);border-radius:22px;padding:20px 22px;color:#fff;margin-bottom:18px;box-shadow:0 12px 28px rgba(79,122,63,.26);">
      <div style="font-size:13px;opacity:.92;font-weight:600;">🍳 AI-recept av veckans fynd</div>
      <div style="font-size:13.5px;opacity:.92;margin-top:6px;line-height:1.5;">Beskriv vad du vill laga (t.ex. "4 personer, snabb vardagsmat, gärna kyckling") så bygger AI:n recept som använder så många av veckans erbjudanden som möjligt.</div>
    </div>`;
  const inputRow = `<div style="display:flex;gap:10px;margin-bottom:18px;">
      <input id="recipe_q" value="${esc(recipeQuery)}" placeholder="t.ex. 4 personer, snabb vardagsmat…" style="${inputStyle()}" ${recipeLoading?'disabled':''}>
      <button onclick="generateRecipes()" ${recipeLoading?'disabled':''} style="flex:none;padding:0 20px;border:none;border-radius:12px;background:${recipeLoading?'#B6A893':'#4F7A3F'};color:#fff;font-weight:700;font-size:14px;font-family:${FAM};cursor:${recipeLoading?'default':'pointer'};">${recipeLoading?'Skapar…':'Skapa recept'}</button>
    </div>`;
  let body = '';
  if(recipeLoading){
    body = `<div style="text-align:center;padding:40px 0;color:#8A7E6E;font-size:14px;">🍳 AI:n läser igenom ${deals.length} erbjudanden och bygger recept…</div>`;
  } else if(recipeError){
    body = `<div style="background:#FBEAE2;color:#C2431F;border-radius:16px;padding:16px;font-size:14px;">⚠️ ${esc(recipeError)}</div>`;
  } else if(recipeResult && Array.isArray(recipeResult.recipes)){
    body = recipeResult.recipes.map(recipeCard).join('');
  } else {
    body = `<div style="text-align:center;padding:30px 0;color:#8A7E6E;font-size:14px;">Skriv vad du är sugen på och tryck "Skapa recept".</div>`;
  }
  return intro + inputRow + body;
}
function inputStyle(){ return `width:100%;padding:12px;border-radius:12px;border:1px solid #E3D8C6;background:#fff;font-size:15px;font-family:${FAM};color:#2A211A;outline:none;`; }
function storeOptions(){ return STORES.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join(''); }
function catOptions(){ return CAT_ORDER.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join(''); }
function seg(on){ return `flex:1;padding:10px;border-radius:11px;border:none;background:${on?'#fff':'transparent'};color:${on?'#2A211A':'#8A7E6E'};font-weight:${on?700:600};font-size:13.5px;cursor:pointer;font-family:${FAM};box-shadow:${on?'0 2px 6px rgba(0,0,0,.07)':'none'};`; }
function lbl(t){ return `<span style="font-size:12.5px;font-weight:700;color:#6A5E50;display:block;margin-bottom:6px;">${t}</span>`; }
function sheetView(){
  if(!sheet) return '';
  const erb = mode==='erbjudande';
  const body = erb ? `
    <div style="font-size:13px;color:#8A7E6E;margin:10px 2px 16px;">Lägg till ett fynd du hittat i veckan.</div>
    <label style="display:block;margin-bottom:13px;">${lbl('Butik')}<select id="f_store" style="${inputStyle()}"><option value="">Välj butik…</option>${storeOptions()}</select></label>
    <label style="display:block;margin-bottom:13px;">${lbl('Produkt')}<input id="f_name" placeholder="t.ex. Kycklingfilé 900g" style="${inputStyle()}"></label>
    <label style="display:block;margin-bottom:13px;">${lbl('Detaljer')}<input id="f_details" placeholder="t.ex. fryst, 2-pack" style="${inputStyle()}"></label>
    <label style="display:block;margin-bottom:13px;">${lbl('Kategori')}<select id="f_cat" style="${inputStyle()}">${catOptions()}</select></label>
    <div style="display:flex;gap:12px;margin-bottom:18px;">
      <label style="flex:1;">${lbl('Rea-pris (kr)')}<input id="f_sale" type="number" inputmode="decimal" placeholder="59" style="${inputStyle()}"></label>
      <label style="flex:1;">${lbl('Ordinarie (kr)')}<input id="f_ord" type="number" inputmode="decimal" placeholder="89" style="${inputStyle()}"></label>
    </div>
    <div style="display:flex;gap:10px;">
      <button onclick="closeSheet()" style="flex:none;padding:13px 18px;border:1px solid #E3D8C6;border-radius:14px;background:#fff;color:#6A5E50;font-weight:700;font-size:15px;font-family:${FAM};cursor:pointer;">Avbryt</button>
      <button onclick="submitOffer()" style="flex:1;padding:13px;border:none;border-radius:14px;background:#E0552E;color:#fff;font-weight:700;font-size:15px;font-family:${FAM};cursor:pointer;">✅ Lägg till erbjudande</button>
    </div>` : `
    <div style="font-size:13px;color:#8A7E6E;margin:10px 2px 16px;">För saker som inte är på rea, t.ex. mjölk eller bröd.</div>
    <label style="display:block;margin-bottom:13px;">${lbl('Vara')}<input id="f_name" placeholder="t.ex. Mjölk 1,5 L" style="${inputStyle()}"></label>
    <label style="display:block;margin-bottom:13px;">${lbl('Butik')}<select id="f_store" style="${inputStyle()}"><option value="ovrigt">Valfri butik</option>${storeOptions()}</select></label>
    <div style="display:flex;gap:12px;margin-bottom:18px;">
      <label style="flex:1;">${lbl('Kategori')}<select id="f_cat" style="${inputStyle()}">${catOptions()}</select></label>
      <label style="width:96px;flex:none;">${lbl('Antal')}<input id="f_qty" type="number" inputmode="numeric" min="1" value="1" style="${inputStyle()}"></label>
    </div>
    <div style="display:flex;gap:10px;">
      <button onclick="closeSheet()" style="flex:none;padding:13px 18px;border:1px solid #E3D8C6;border-radius:14px;background:#fff;color:#6A5E50;font-weight:700;font-size:15px;font-family:${FAM};cursor:pointer;">Avbryt</button>
      <button onclick="submitCustom()" style="flex:1;padding:13px;border:none;border-radius:14px;background:#4F7A3F;color:#fff;font-weight:700;font-size:15px;font-family:${FAM};cursor:pointer;">✅ Lägg till på listan</button>
    </div>`;
  return `<div onclick="closeSheet()" style="position:fixed;inset:0;z-index:40;background:rgba(42,33,26,.45);backdrop-filter:blur(3px);display:flex;align-items:flex-end;justify-content:center;animation:vfFade .2s ease;">
    <div onclick="event.stopPropagation()" style="width:100%;max-width:520px;background:#FBF6EE;border-radius:26px 26px 0 0;padding:18px clamp(16px,4vw,24px) 30px;animation:vfSheet .3s cubic-bezier(.22,1,.36,1);max-height:92vh;overflow:auto;">
      <div style="width:40px;height:4px;background:#E0D5C2;border-radius:3px;margin:0 auto 16px;"></div>
      <div style="display:flex;background:#F0E8DA;border-radius:14px;padding:4px;margin-bottom:8px;">
        <button onclick="setMode('erbjudande')" style="${seg(erb)}">🏷️ Erbjudande</button>
        <button onclick="setMode('vara')" style="${seg(!erb)}">🛒 Egen vara</button>
      </div>${body}
    </div></div>`;
}
function fab(){ return `<button onclick="openSheet('erbjudande')" style="position:fixed;right:clamp(16px,4vw,28px);bottom:calc(24px + env(safe-area-inset-bottom));z-index:30;height:54px;padding:0 22px;border:none;border-radius:17px;background:#E0552E;color:#fff;font-family:${DISP};font-weight:700;font-size:16px;box-shadow:0 10px 26px rgba(224,85,46,.42);cursor:pointer;display:flex;align-items:center;gap:8px;">✏️ Erbjudande</button>`; }

function render(){
  const main = tab==='erbjudanden'?viewOffers():tab==='butiker'?viewStores():tab==='recept'?viewRecipes():viewList();
  document.getElementById('app').innerHTML =
    header() +
    `<main style="${PAGE}padding-bottom:96px;animation:vfFade .3s ease;">${main}</main>` +
    fab() + sheetView();
}
function go(t){ tab=t; if(t!=='erbjudanden') cat='Alla'; render(); }
function setCat(c){ cat=c; render(); }
function openSheet(m){ sheet=true; mode=m; render(); }
function closeSheet(){ sheet=null; render(); }
function setMode(m){ mode=m; render(); }

// ── Init ──────────────────────────────────────────────────
render();
loadShoppingList();
setInterval(loadShoppingList, 5000);
</script>
</body>
</html>
